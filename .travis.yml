language: php
php:
  - 8.3
  - 8.4
cache:
  directories:
    - $HOME/.composer/cache/files

matrix:
  fast_finish: true
  include:
    - php: 8.3
      env: COMPOSER_FLAGS='--prefer-lowest --prefer-stable' SYMFONY_DEPRECATIONS_HELPER=max[total]=999999
    - php: 8.3
      env: SYMFONY_VERSION='^6.4'
    - php: 8.3
      env: SYMFONY_VERSION='^7.4'
    - php: 8.4
      env: SYMFONY_VERSION='^6.4'
    - php: 8.4
      env: SYMFONY_VERSION='^7.4'

before_install:
  - composer self-update
  - if [ "$DEPENDENCIES" == "dev" ]; then perl -pi -e 's/^}$/,"minimum-stability":"dev"}/' composer.json; fi;
  - if [ "$SYMFONY_VERSION" != "" ]; then composer --no-update require symfony/framework-bundle:${SYMFONY_VERSION}; fi;

install:
  - composer update $COMPOSER_FLAGS

script:
  - ./vendor/bin/phpunit
